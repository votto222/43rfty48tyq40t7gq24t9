<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0e8">
<title>Todo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f0e8;--s1:#ede8de;--s2:#e4ddd0;--s3:#d8d0c0;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --text:#1a1714;--muted:rgba(0,0,0,0.38);--hint:rgba(0,0,0,0.18);
  --accent:#7c5c2e;--high:#c0392b;--mid:#c47d00;--low:#2e7d5a;
}
html{min-height:100%;}
body{min-height:100vh;font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
.header{padding:52px 20px 16px;position:sticky;top:0;z-index:20;background:linear-gradient(to bottom,var(--bg) 85%,transparent);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.month-nav{display:flex;align-items:center;gap:12px;}
.month-label{font-size:22px;font-weight:500;letter-spacing:-0.5px;}
.nav-btn{width:34px;height:34px;border:1px solid var(--border2);border-radius:10px;background:var(--s1);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-btn:active{background:var(--s2);}
.today-btn{font-size:12px;color:var(--accent);background:rgba(124,92,46,0.1);border:1px solid rgba(124,92,46,0.2);border-radius:8px;padding:5px 12px;cursor:pointer;font-family:'DM Sans','Noto Sans JP',sans-serif;}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px 6px;}
.wd{text-align:center;font-size:11px;color:var(--muted);letter-spacing:0.5px;}
.wd:first-child{color:rgba(192,57,43,0.7);}
.wd:last-child{color:rgba(0,80,180,0.6);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 10px 24px;}
.cal-cell{aspect-ratio:1/1.05;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:6px 4px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;overflow:hidden;transition:border-color 0.15s,background 0.15s;}
.cal-cell:active{background:var(--s2);}
.cal-cell.other-month{opacity:0.2;}
.cal-cell.has-tasks{border-color:var(--border2);}
.cal-cell.today{border-color:var(--accent);border-width:1.5px;}
.cal-cell.today .day-num{color:var(--accent);font-weight:500;}
.cal-cell.selected{background:var(--s2);border-color:rgba(0,0,0,0.3);}
.day-num{font-size:13px;font-weight:300;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.sun .day-num{color:rgba(192,57,43,0.8);}
.sat .day-num{color:rgba(0,80,180,0.7);}
.cal-cell.today.sun .day-num,.cal-cell.today.sat .day-num{color:var(--accent);}
.dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:4px;padding:0 2px;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot.high{background:var(--high);}.dot.mid{background:var(--mid);}.dot.low{background:var(--low);}.dot.done{background:var(--hint);}

/* パネル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:30;backdrop-filter:blur(2px);}
.overlay.show{display:block;}
.panel{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:var(--s1);border-radius:24px 24px 0 0;border-top:1px solid var(--border);z-index:31;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.32,0,.15,1);}
.panel.show{transform:translateY(0);}
.handle{width:36px;height:3px;background:var(--s3);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;flex-shrink:0;}
.panel-date{font-size:18px;font-weight:500;letter-spacing:-0.3px;}
.panel-close{width:32px;height:32px;background:var(--s2);border:1px solid var(--border2);border-radius:10px;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.panel-body{flex:1;overflow-y:auto;padding:0 16px;padding-bottom:calc(24px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch;}

/* 入力 */
.input-wrap{display:flex;gap:8px;align-items:center;background:var(--s2);border:1px solid var(--border2);border-radius:16px;padding:8px 8px 8px 16px;margin-bottom:6px;}
.input-wrap input{flex:1;border:none;background:transparent;font-size:16px;font-family:'DM Sans','Noto Sans JP',sans-serif;color:var(--text);outline:none;min-width:0;font-weight:300;}
.input-wrap input::placeholder{color:var(--hint);}
.prio-btn{width:30px;height:30px;min-width:30px;border-radius:50%;border:none;cursor:pointer;transition:transform 0.15s;}
.prio-btn:active{transform:scale(0.9);}
.mic-btn{width:36px;height:36px;min-width:36px;border-radius:11px;border:1px solid var(--border2);background:var(--s3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.mic-btn.listening{background:rgba(192,57,43,0.1);border-color:var(--high);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.mic-btn:disabled{opacity:0.25;cursor:not-allowed;}
.add-btn{width:36px;height:36px;min-width:36px;border-radius:11px;border:none;background:var(--accent);color:#f5f0e8;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:500;}
.add-btn:active{transform:scale(0.93);}
.voice-hint{font-size:11px;color:var(--high);height:14px;margin-bottom:6px;padding-left:4px;}

/* タスク */
.task-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.task-item{background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:12px 14px;animation:fadeUp 0.2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.task-item.done{opacity:0.38;}
.task-top{display:flex;align-items:center;gap:10px;}
.check-btn{width:24px;height:24px;min-width:24px;border:1.5px solid var(--border2);border-radius:50%;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.check-btn.checked{background:var(--accent);border-color:var(--accent);}
.chk{display:none;}
.check-btn.checked .chk{display:block;}
.prio-pip{width:6px;height:6px;min-width:6px;border-radius:50%;flex-shrink:0;}
.pip-high{background:var(--high);}.pip-mid{background:var(--mid);}.pip-low{background:var(--low);}
.task-text{flex:1;font-size:15px;line-height:1.5;word-break:break-all;font-weight:300;}
.task-item.done .task-text{text-decoration:line-through;color:var(--hint);}
.del-btn{width:30px;height:30px;border:none;background:transparent;color:var(--hint);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* リマインダー */
.reminder-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.reminder-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.reminder-time{font-size:12px;color:var(--accent);font-weight:400;flex:1;}
.reminder-input{font-size:13px;font-family:'DM Sans','Noto Sans JP',sans-serif;color:var(--text);background:var(--s3);border:1px solid var(--border2);border-radius:8px;padding:4px 8px;outline:none;width:100%;}
.set-reminder-btn{font-size:12px;color:var(--accent);background:rgba(124,92,46,0.1);border:1px solid rgba(124,92,46,0.2);border-radius:8px;padding:4px 10px;cursor:pointer;font-family:'DM Sans','Noto Sans JP',sans-serif;white-space:nowrap;}
.del-reminder-btn{font-size:16px;color:var(--hint);background:none;border:none;cursor:pointer;}

/* 添付 */
.attachments{margin-top:10px;display:flex;flex-direction:column;gap:5px;}
.att-row{display:flex;align-items:center;gap:8px;background:var(--s3);border-radius:10px;padding:8px 10px;}
.att-icon{font-size:16px;min-width:18px;}
.att-name{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.att-size{font-size:11px;color:var(--muted);white-space:nowrap;}
.att-open{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0 4px;font-family:'DM Sans','Noto Sans JP',sans-serif;}
.att-del{font-size:17px;color:var(--hint);background:none;border:none;cursor:pointer;}
.attach-btn{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--muted);background:none;border:1px dashed var(--border2);border-radius:10px;padding:8px 12px;cursor:pointer;font-family:'DM Sans','Noto Sans JP',sans-serif;width:100%;}
.empty{text-align:center;padding:36px 20px;color:var(--hint);font-size:13px;line-height:2.2;font-weight:300;}

/* 通知バナー */
.notif-banner{display:none;background:rgba(124,92,46,0.12);border:1px solid rgba(124,92,46,0.25);border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:var(--accent);cursor:pointer;text-align:center;}
.notif-banner.show{display:block;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="month-nav">
      <button class="nav-btn" id="prev">&#8249;</button>
      <span class="month-label" id="month-label"></span>
      <button class="nav-btn" id="next">&#8250;</button>
    </div>
    <button class="today-btn" id="today-btn">今日</button>
  </div>
</div>
<div class="weekdays">
  <div class="wd">SUN</div><div class="wd">MON</div><div class="wd">TUE</div>
  <div class="wd">WED</div><div class="wd">THU</div><div class="wd">FRI</div><div class="wd">SAT</div>
</div>
<div class="cal-grid" id="cal-grid"></div>

<div class="overlay" id="overlay"></div>
<div class="panel" id="panel">
  <div class="handle"></div>
  <div class="panel-head">
    <span class="panel-date" id="panel-date"></span>
    <button class="panel-close" id="panel-close">&#215;</button>
  </div>
  <div class="panel-body">
    <div class="notif-banner" id="notif-banner">🔔 通知を許可するとリマインダーが使えます。タップして許可</div>
    <div class="input-wrap">
      <input type="text" id="new-task" placeholder="新しいタスク..." maxlength="100"/>
      <button class="prio-btn" id="prio-btn"></button>
      <button class="mic-btn" id="mic-btn">🎤</button>
      <button class="add-btn" id="add-btn">+</button>
    </div>
    <div class="voice-hint" id="voice-hint"></div>
    <div class="task-list" id="task-list"></div>
  </div>
</div>
<input type="file" id="file-input" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.png,.jpg,.jpeg" style="display:none"/>

<script>
const SK='cal_todo_v2';
let data={},cy,cm,sel=null,prio='mid',ak=null,ai=null;
const pc={high:'#c0392b',mid:'#c47d00',low:'#2e7d5a'};
const po=['low','mid','high'];
const timers={};
let swReg=null;

function fmt(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function todayStr(){const d=new Date();return fmt(d.getFullYear(),d.getMonth()+1,d.getDate());}
function fi(n){const e=(n.split('.').pop()||'').toLowerCase();if(e==='pdf')return'📄';if(['doc','docx'].includes(e))return'📝';if(['xls','xlsx'].includes(e))return'📊';if(['png','jpg','jpeg','gif','webp'].includes(e))return'🖼';return'📎';}
function fs(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function load(){try{const r=localStorage.getItem(SK);if(r)data=JSON.parse(r);}catch(e){data={};}}
function save(){try{localStorage.setItem(SK,JSON.stringify(data));}catch(e){alert('ストレージ容量が不足しています。');}}

/* Service Worker 登録 */
async function initSW(){
  if(!('serviceWorker' in navigator))return;
  try{swReg=await navigator.serviceWorker.register('sw.js');} catch(e){}
}

/* 通知権限 */
function notifGranted(){return typeof Notification!=='undefined'&&Notification.permission==='granted';}
function checkNotifBanner(){
  if(typeof Notification==='undefined')return;
  if(Notification.permission==='default'){
    document.getElementById('notif-banner').classList.add('show');
  }
}
document.getElementById('notif-banner').addEventListener('click',async()=>{
  const p=await Notification.requestPermission();
  if(p==='granted'){document.getElementById('notif-banner').classList.remove('show');scheduleAll();}
});

/* 通知を送る */
function sendNotif(title,body){
  if(!notifGranted())return;
  if(swReg&&swReg.active){
    swReg.active.postMessage({type:'NOTIFY',title,body});
  } else {
    new Notification(title,{body});
  }
}

/* リマインダーをスケジュール */
function scheduleReminder(key,idx,task){
  const id=key+'_'+idx;
  if(timers[id])clearTimeout(timers[id]);
  if(!task.reminder)return;
  const t=new Date(task.reminder).getTime()-Date.now();
  if(t<=0)return;
  timers[id]=setTimeout(()=>{
    sendNotif('📅 リマインダー',task.text);
  },t);
}

function scheduleAll(){
  Object.keys(data).forEach(key=>{
    (data[key]||[]).forEach((t,i)=>scheduleReminder(key,i,t));
  });
}

function renderCal(){
  document.getElementById('month-label').textContent=cy+'年'+cm+'月';
  const grid=document.getElementById('cal-grid');
  const first=new Date(cy,cm-1,1).getDay();
  const days=new Date(cy,cm,0).getDate();
  const prevDays=new Date(cy,cm-1,0).getDate();
  const today=todayStr();
  let html='';
  for(let i=0;i<first;i++){const d=prevDays-first+1+i;const y=cm===1?cy-1:cy,m=cm===1?12:cm-1;html+=cell(d,fmt(y,m,d),true,today,i);}
  for(let d=1;d<=days;d++)html+=cell(d,fmt(cy,cm,d),false,today,(first+d-1)%7);
  const rem=(first+days)%7;
  if(rem>0)for(let d=1;d<=7-rem;d++){const y=cm===12?cy+1:cy,m=cm===12?1:cm+1;html+=cell(d,fmt(y,m,d),true,today,(rem+d-1)%7);}
  grid.innerHTML=html;
  grid.querySelectorAll('.cal-cell').forEach(c=>c.addEventListener('click',()=>openPanel(c.dataset.key)));
}

function cell(d,key,other,today,dow){
  const tasks=data[key]||[];
  let cls='cal-cell';
  if(other)cls+=' other-month';
  if(key===today)cls+=' today';
  if(key===sel)cls+=' selected';
  if(tasks.length)cls+=' has-tasks';
  if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';
  const dots=tasks.slice(0,4).map(t=>'<div class="dot '+(t.done?'done':t.prio)+'"></div>').join('');
  return '<div class="'+cls+'" data-key="'+key+'"><div class="day-num">'+d+'</div><div class="dots">'+dots+'</div></div>';
}

function openPanel(key){
  sel=key;
  const p=key.split('-').map(Number);
  const w=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('panel-date').textContent=p[1]+'/'+p[2]+' '+w[new Date(p[0],p[1]-1,p[2]).getDay()];
  checkNotifBanner();
  renderPanel();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
  setTimeout(()=>document.getElementById('new-task').focus(),320);
  renderCal();
}
function closePanel(){
  sel=null;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  renderCal();
}

function reminderHtml(key,i,t){
  if(t.reminder){
    const d=new Date(t.reminder);
    const label=d.getMonth()+1+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    return '<div class="reminder-row"><span class="reminder-label">🔔</span><span class="reminder-time">'+label+'</span><button class="del-reminder-btn" onclick="delReminder(\''+key+'\','+i+')">&#215;</button></div>';
  }
  const dateVal=key+'T09:00';
  return '<div class="reminder-row"><span class="reminder-label">🔔</span><input class="reminder-input" type="datetime-local" id="ri_'+key+'_'+i+'" value="'+dateVal+'"/><button class="set-reminder-btn" onclick="setReminder(\''+key+'\','+i+')">セット</button></div>';
}

function renderPanel(){
  if(!sel)return;
  const tasks=data[sel]||[];
  const list=document.getElementById('task-list');
  if(!tasks.length){list.innerHTML='<div class="empty">タスクはまだありません<br>上の入力欄から追加できます</div>';return;}
  list.innerHTML=tasks.map((t,i)=>{
    const ah=(t.attachments||[]).map((a,j)=>'<div class="att-row"><span class="att-icon">'+fi(a.name)+'</span><span class="att-name">'+esc(a.name)+'</span><span class="att-size">'+fs(a.size)+'</span><button class="att-open" onclick="openFile(\''+sel+'\','+i+','+j+')">開く</button><button class="att-del" onclick="delFile(\''+sel+'\','+i+','+j+')">&#215;</button></div>').join('');
    return '<div class="task-item'+(t.done?' done':'')+'"><div class="task-top"><button class="check-btn'+(t.done?' checked':'')+'" onclick="toggleTask(\''+sel+'\','+i+')"><svg class="chk" width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4.2 7.5L10 1" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="prio-pip pip-'+t.prio+'"></div><span class="task-text">'+esc(t.text)+'</span><button class="del-btn" onclick="delTask(\''+sel+'\','+i+')">&#215;</button></div>'+reminderHtml(sel,i,t)+(ah?'<div class="attachments">'+ah+'</div>':'')+'<button class="attach-btn" onclick="startAttach(\''+sel+'\','+i+')"><span style="font-size:14px">📎</span> ファイルを添付</button></div>';
  }).join('');
}

function setReminder(key,i){
  const el=document.getElementById('ri_'+key+'_'+i);
  if(!el||!el.value)return;
  const dt=new Date(el.value);
  if(dt<=new Date()){alert('過去の時刻は設定できません。');return;}
  if(!notifGranted()){alert('通知を許可してからリマインダーをセットしてください。');return;}
  data[key][i].reminder=el.value;
  save();scheduleReminder(key,i,data[key][i]);renderPanel();renderCal();
}
function delReminder(key,i){
  if(!data[key]||!data[key][i])return;
  delete data[key][i].reminder;
  const id=key+'_'+i;if(timers[id])clearTimeout(timers[id]);
  save();renderPanel();
}

function toggleTask(key,i){if(!data[key])return;data[key][i].done=!data[key][i].done;save();renderPanel();renderCal();}
function delTask(key,i){
  if(!data[key])return;
  const id=key+'_'+i;if(timers[id])clearTimeout(timers[id]);
  data[key].splice(i,1);if(!data[key].length)delete data[key];
  save();renderPanel();renderCal();
}
function startAttach(key,i){ak=key;ai=i;document.getElementById('file-input').click();}
function openFile(key,i,j){const a=data[key][i].attachments[j];const l=document.createElement('a');l.href=a.data;l.download=a.name;l.click();}
function delFile(key,i,j){data[key][i].attachments.splice(j,1);save();renderPanel();}

document.getElementById('file-input').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  if(f.size>5242880){alert('5MB以下のファイルを選んでください');this.value='';return;}
  const r=new FileReader();
  r.onload=e=>{if(!data[ak]||!data[ak][ai])return;if(!data[ak][ai].attachments)data[ak][ai].attachments=[];data[ak][ai].attachments.push({name:f.name,size:f.size,data:e.target.result});save();renderPanel();};
  r.readAsDataURL(f);this.value='';
});

function addTask(text){
  if(!sel)return;
  const inp=document.getElementById('new-task');
  const v=(text!==undefined?text:inp.value).trim();if(!v)return;
  if(!data[sel])data[sel]=[];
  data[sel].push({id:Date.now().toString(36),text:v,done:false,prio,attachments:[]});
  inp.value='';inp.focus();save();renderPanel();renderCal();
}
document.getElementById('add-btn').addEventListener('click',()=>addTask());
document.getElementById('new-task').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
document.getElementById('prev').addEventListener('click',()=>{cm--;if(cm<1){cm=12;cy--;}renderCal();});
document.getElementById('next').addEventListener('click',()=>{cm++;if(cm>12){cm=1;cy++;}renderCal();});
document.getElementById('today-btn').addEventListener('click',()=>{const n=new Date();cy=n.getFullYear();cm=n.getMonth()+1;renderCal();});
document.getElementById('overlay').addEventListener('click',closePanel);
document.getElementById('panel-close').addEventListener('click',closePanel);

const pb=document.getElementById('prio-btn');
pb.style.background=pc[prio];
pb.addEventListener('click',()=>{prio=po[(po.indexOf(prio)+1)%3];pb.style.background=pc[prio];});

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const micBtn=document.getElementById('mic-btn');
const vhint=document.getElementById('voice-hint');
if(!SR){micBtn.disabled=true;}
else{
  const recog=new SR();recog.lang='ja-JP';recog.interimResults=true;recog.maxAlternatives=1;
  let ls=false;
  recog.onstart=()=>{ls=true;micBtn.classList.add('listening');vhint.textContent='🎤 話しかけてください...';};
  recog.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join('');document.getElementById('new-task').value=t;if(e.results[e.results.length-1].isFinal)addTask(t);};
  recog.onerror=e=>{if(e.error==='not-allowed')alert('マイクを許可してください。');stop();};
  recog.onend=()=>stop();
  function stop(){ls=false;micBtn.classList.remove('listening');vhint.textContent='';}
  micBtn.addEventListener('click',()=>{ls?recog.stop():recog.start();});
}

const now=new Date();cy=now.getFullYear();cm=now.getMonth()+1;
load();initSW();scheduleAll();renderCal();
</script>
