<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f8f7f4">
<title>Todo リスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.1);
  --border-hover: rgba(0,0,0,0.2);
  --text: #1a1a1a;
  --muted: #888;
  --hint: #bbb;
  --p-high: #e24b4a;
  --p-mid: #ef9f27;
  --p-low: #639922;
  --accent: #1a1a1a;
}
html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
#app {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 100px;
  min-height: 100vh;
}
header {
  padding: 52px 20px 20px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}
h1 { font-size: 26px; font-weight: 500; letter-spacing: -0.5px; }
.date { font-size: 12px; color: var(--muted); margin-top: 2px; }
.stats { display: flex; gap: 16px; margin-top: 14px; }
.stat { font-size: 12px; color: var(--muted); }
.stat strong { color: var(--text); font-weight: 500; }
.filters {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  padding: 5px 14px;
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  border: 1px solid var(--border);
  border-radius: 99px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.filter-btn.active {
  background: var(--text);
  border-color: var(--text);
  color: #fff;
}
.list {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.todo-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 14px;
  transition: border-color 0.15s;
  animation: slideIn 0.2s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.todo-item.done { opacity: 0.45; }
.check-btn {
  width: 22px; height: 22px; min-width: 22px;
  border: 2px solid var(--border-hover);
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  -webkit-appearance: none;
}
.check-btn.checked {
  background: var(--text);
  border-color: var(--text);
}
.check-icon { display: none; }
.check-btn.checked .check-icon { display: block; }
.prio-dot {
  width: 7px; height: 7px; min-width: 7px;
  border-radius: 50%;
}
.p-high { background: var(--p-high); }
.p-mid { background: var(--p-mid); }
.p-low { background: var(--p-low); }
.todo-text {
  flex: 1;
  font-size: 15px;
  line-height: 1.4;
  color: var(--text);
  word-break: break-all;
}
.todo-item.done .todo-text {
  text-decoration: line-through;
  color: var(--hint);
}
.del-btn {
  width: 28px; height: 28px;
  border: none; background: transparent;
  color: var(--hint);
  font-size: 18px;
  cursor: pointer;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  -webkit-appearance: none;
}
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--hint);
  font-size: 14px;
}
.input-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(248,247,244,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 8px 8px 14px;
}
.input-row input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  outline: none;
}
.input-row input::placeholder { color: var(--hint); }
.prio-toggle {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-appearance: none;
  background: transparent;
}
.add-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: none;
  background: var(--text);
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
  -webkit-appearance: none;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Todo リスト</h1>
    <p class="date" id="date-label"></p>
    <div class="stats">
      <span class="stat">残り <strong id="active-count">0</strong> 件</span>
      <span class="stat">完了 <strong id="done-count">0</strong> 件</span>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-f="all">すべて</button>
      <button class="filter-btn" data-f="active">未完了</button>
      <button class="filter-btn" data-f="done">完了</button>
      <button class="filter-btn" data-f="high">🔴 高</button>
      <button class="filter-btn" data-f="mid">🟡 中</button>
      <button class="filter-btn" data-f="low">🟢 低</button>
    </div>
  </header>
  <div class="list" id="list"></div>
</div>

<div class="input-bar">
  <div class="input-row">
    <input type="text" id="new-task" placeholder="新しいタスクを入力..." maxlength="100" />
    <button class="prio-toggle" id="prio-toggle" title="優先度"></button>
    <button class="add-btn" id="add-btn">+</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'todo_v2';
let todos = [];
let filter = 'all';
let prio = 'mid';

const prioColors = { high: '#e24b4a', mid: '#ef9f27', low: '#639922' };

function loadTodos() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) todos = JSON.parse(raw);
  } catch(e) { todos = []; }
}

function saveTodos() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); } catch(e) {}
}

function setDate() {
  const d = new Date();
  const w = ['日','月','火','水','木','金','土'];
  document.getElementById('date-label').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w[d.getDay()]}）`;
}

function render() {
  const filtered = todos.filter(t => {
    if (filter === 'done') return t.done;
    if (filter === 'active') return !t.done;
    if (filter === 'high') return t.prio === 'high';
    if (filter === 'mid') return t.prio === 'mid';
    if (filter === 'low') return t.prio === 'low';
    return true;
  });

  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">タスクがありません</div>';
  } else {
    list.innerHTML = filtered.map(t => `
      <div class="todo-item${t.done ? ' done' : ''}" data-id="${t.id}">
        <button class="check-btn${t.done ? ' checked' : ''}" onclick="toggle('${t.id}')">
          <svg class="check-icon" width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4L4.2 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="prio-dot p-${t.prio}"></div>
        <span class="todo-text">${esc(t.text)}</span>
        <button class="del-btn" onclick="del('${t.id}')">×</button>
      </div>
    `).join('');
  }

  document.getElementById('active-count').textContent = todos.filter(t => !t.done).length;
  document.getElementById('done-count').textContent = todos.filter(t => t.done).length;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggle(id) {
  const t = todos.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTodos(); render(); }
}

function del(id) {
  todos = todos.filter(t => t.id !== id);
  saveTodos(); render();
}

function addTask() {
  const inp = document.getElementById('new-task');
  const v = inp.value.trim();
  if (!v) return;
  todos.unshift({
    id: Date.now().toString(36),
    text: v,
    done: false,
    prio: prio
  });
  inp.value = '';
  saveTodos(); render();
}

document.getElementById('add-btn').addEventListener('click', addTask);
document.getElementById('new-task').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

const prioOrder = ['low', 'mid', 'high'];
const prioToggle = document.getElementById('prio-toggle');
prioToggle.style.background = prioColors[prio];

prioToggle.addEventListener('click', () => {
  const idx = prioOrder.indexOf(prio);
  prio = prioOrder[(idx + 1) % 3];
  prioToggle.style.background = prioColors[prio];
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filter = btn.dataset.f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

setDate();
loadTodos();
render();
</script>
</body>
</html>
